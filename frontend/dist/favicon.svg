<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="favBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0e0e14" />
      <stop offset="100%" stop-color="#020204" />
    </radialGradient>

    <!-- Sun Flare Gradient -->
    <linearGradient id="favFlare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb700" />
      <stop offset="50%" stop-color="#ff5e00" />
      <stop offset="100%" stop-color="#ff2a00" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#favBg)" stroke="#ff7b00" stroke-width="1.2" stroke-opacity="0.4" />

  <!-- Outer HUD Ring -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="#ff7b00" stroke-width="0.8" stroke-opacity="0.3" />

  <!-- Outer Flare Spikes -->
  <path d="M 24 6 L 26.5 17 L 24 15 L 21.5 17 Z" fill="url(#favFlare)" />
  <path d="M 24 42 L 26.5 31 L 24 33 L 21.5 31 Z" fill="url(#favFlare)" />
  <path d="M 6 24 L 17 26.5 L 15 24 L 17 21.5 Z" fill="url(#favFlare)" />
  <path d="M 42 24 L 31 26.5 L 33 24 L 31 21.5 Z" fill="url(#favFlare)" />

  <!-- Core Glowing Sun Circle -->
  <circle cx="24" cy="24" r="7.5" fill="url(#favFlare)" stroke="#ffffff" stroke-width="1" />
  <circle cx="24" cy="24" r="4.5" fill="#ffffff" opacity="0.9" />
</svg>